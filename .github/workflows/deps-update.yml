# ─────────────────────────────────────────────────────────────────────
#  Dependency Update — tui-spinner
#  Nightly job that upgrades dependencies, runs the quality gate,
#  and opens a pull request with the changes.
#
#  Schedule: every day at 02:00 UTC.
#  Can also be triggered manually via workflow_dispatch.
# ─────────────────────────────────────────────────────────────────────

name: Dependency Update

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

concurrency:
  group: deps-update
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  BRANCH_NAME: chore/deps-update

permissions:
  contents: write
  pull-requests: write

jobs:
  deps-update:
    name: Upgrade dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-edit
        run: |
          cargo install cargo-edit --locked
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Pre-warm cargo registry (refresh index + fetch sources)
        run: |
          cargo update
          cargo fetch

      - name: Upgrade workspace dependency pins
        run: cargo upgrade --incompatible allow

      - name: Sync Cargo.lock
        run: cargo update

      # ── Reject downgrades ────────────────────────────────────────────────────
      # Compare every version in Cargo.toml before/after the upgrade.
      # If any dependency version decreased, abort — upgrades only.
      - name: Reject version downgrades
        run: |
          echo "🔍 Checking for version downgrades in Cargo.toml…"

          git show HEAD:Cargo.toml > /tmp/old_cargo.toml

          extract_deps() {
            awk '
              /^\[dependencies\]/ || /^\[dev-dependencies\]/ || /^\[build-dependencies\]/ { in_deps=1; next }
              /^\[/ { in_deps=0 }
              in_deps && /version\s*=/ {
                if (match($0, /^([a-zA-Z0-9_-]+)\s*=.*version\s*=\s*"([^"]+)"/, m)) {
                  print m[1], m[2]
                }
              }
              in_deps && /^[a-zA-Z0-9_-]+\s*=\s*"/ {
                if (match($0, /^([a-zA-Z0-9_-]+)\s*=\s*"([^"]+)"/, m)) {
                  print m[1], m[2]
                }
              }
            ' "$1"
          }

          extract_deps /tmp/old_cargo.toml | sort > /tmp/old_versions.txt
          extract_deps Cargo.toml | sort > /tmp/new_versions.txt

          downgrades=""
          while read -r pkg old_ver; do
            new_ver=$(awk -v p="$pkg" '$1 == p { print $2 }' /tmp/new_versions.txt)
            [ -z "$new_ver" ] && continue

            higher=$(printf '%s\n%s\n' "$old_ver" "$new_ver" | sort -V | tail -n1)
            if [ "$higher" = "$old_ver" ] && [ "$old_ver" != "$new_ver" ]; then
              echo "❌ DOWNGRADE: $pkg $old_ver → $new_ver"
              downgrades="$downgrades $pkg"
            fi
          done < /tmp/old_versions.txt

          if [ -n "$downgrades" ]; then
            echo ""
            echo "🚫 Aborting — version downgrades detected. Only upgrades are allowed."
            echo "   Affected packages:$downgrades"
            echo "   Restoring original Cargo.toml…"
            git checkout -- Cargo.toml
            cargo update
            exit 1
          fi

          echo "✅ No downgrades detected — all changes are upgrades."

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet Cargo.toml Cargo.lock; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "ℹ️  No dependency changes detected."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "📦 Dependency changes detected."
            git diff --stat
          fi

      - name: Check formatting
        if: steps.changes.outputs.changed == 'true'
        run: cargo fmt --check

      - name: Clippy
        if: steps.changes.outputs.changed == 'true'
        run: cargo clippy --all-features -- -D warnings

      - name: Tests
        if: steps.changes.outputs.changed == 'true'
        run: cargo test --all-features

      - name: Create pull request
        if: steps.changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        id: cpr
        with:
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          branch: ${{ env.BRANCH_NAME }}
          delete-branch: true
          commit-message: "chore(deps): automated dependency upgrades"
          title: "chore(deps): automated dependency upgrades"
          body: |
            ## 🤖 Automated Dependency Update

            This PR was created by the **Dependency Update** workflow.

            ### Changes
            - Ran `cargo upgrade --incompatible allow`
            - Ran `cargo update`

            ### Quality Gate
            - ✅ `cargo fmt --check`
            - ✅ `cargo clippy -- -D warnings`
            - ✅ `cargo test --all-features`

            ---
            *Auto-generated by [deps-update.yml](${{ github.server_url }}/${{ github.repository }}/actions/workflows/deps-update.yml)*
          labels: |
            dependencies
            automated

      - name: Enable auto-merge
        if: steps.changes.outputs.changed == 'true' && steps.cpr.outputs.pull-request-number
        run: |
          echo "🔀 Enabling auto-merge for PR #${{ steps.cpr.outputs.pull-request-number }}…"
          gh pr merge "${{ steps.cpr.outputs.pull-request-number }}" \
            --auto --squash --delete-branch || {
              echo "⚠️  Auto-merge could not be enabled (branch protection may not be configured)."
              echo "   PR is still open for manual review."
            }
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}

# ─────────────────────────────────────────────────────────────────────
#  Dependency Update — tui-spinner
#  Nightly job that upgrades dependencies, runs the quality gate,
#  and opens a pull request with the changes.
#
#  Schedule: every day at 02:00 UTC.
#  Can also be triggered manually via workflow_dispatch.
# ─────────────────────────────────────────────────────────────────────

name: Dependency Update

on:
  schedule:
    # Run every day at 02:00 UTC.
    - cron: "0 2 * * *"
  workflow_dispatch:

# Only one dependency-update run at a time.
concurrency:
  group: deps-update
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  BRANCH_NAME: chore/deps-update

permissions:
  contents: write
  pull-requests: write

jobs:
  # ── Upgrade, verify, and open PR ─────────────────────────────────
  deps-update:
    name: Upgrade dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Use a PAT so the created PR can trigger CI workflows.
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      # ── Toolchain ────────────────────────────────────────────────
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      # ── Install cargo-edit (provides `cargo upgrade`) ────────────
      - name: Install cargo-edit
        run: |
          cargo install cargo-edit --locked
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      # ── Pre-warm the registry ────────────────────────────────────
      - name: Pre-warm registry
        run: |
          cargo update
          cargo fetch

      # ── Upgrade dependencies ─────────────────────────────────────
      - name: Upgrade dependencies
        run: |
          # Upgrade to latest versions, including incompatible bumps.
          cargo upgrade --incompatible allow
          # Re-resolve the lock file after the upgrades.
          cargo update

      # ── Check for changes ────────────────────────────────────────
      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "ℹ️  No dependency changes detected."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "📦 Dependency changes detected."
            git diff --stat
          fi

      # ── Quality gate — only if something changed ─────────────────
      - name: Check formatting
        if: steps.changes.outputs.changed == 'true'
        run: cargo fmt --check

      - name: Clippy
        if: steps.changes.outputs.changed == 'true'
        run: cargo clippy --all-features -- -D warnings

      - name: Tests
        if: steps.changes.outputs.changed == 'true'
        run: cargo test --all-features

      # ── Create pull request ──────────────────────────────────────
      - name: Create pull request
        if: steps.changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        id: cpr
        with:
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          branch: ${{ env.BRANCH_NAME }}
          delete-branch: true
          commit-message: "chore(deps): automated dependency upgrades"
          title: "chore(deps): automated dependency upgrades"
          body: |
            ## 🤖 Automated Dependency Update

            This PR was created by the **Dependency Update** workflow.

            ### Changes
            - Ran `cargo upgrade --incompatible allow`
            - Ran `cargo update`

            ### Quality Gate
            - ✅ `cargo fmt --check`
            - ✅ `cargo clippy -- -D warnings`
            - ✅ `cargo test --all-features`

            ---
            *Auto-generated by [deps-update.yml](${{ github.server_url }}/${{ github.repository }}/actions/workflows/deps-update.yml)*
          labels: |
            dependencies
            automated

      # ── Auto-merge the PR ────────────────────────────────────────
      - name: Enable auto-merge
        if: steps.changes.outputs.changed == 'true' && steps.cpr.outputs.pull-request-number
        run: |
          echo "🔀 Enabling auto-merge for PR #${{ steps.cpr.outputs.pull-request-number }}..."
          gh pr merge "${{ steps.cpr.outputs.pull-request-number }}" \
            --auto --squash --delete-branch || {
              echo "⚠️  Auto-merge could not be enabled (branch protection may not be configured)."
              echo "   PR is still open for manual review."
            }
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}

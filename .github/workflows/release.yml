name: Release

on:
  push:
    tags:
      - "v*"
  # Manual fallback — trigger from the GitHub Actions UI if the tag push
  # ever silently skips or a re-run is needed without re-pushing the tag.
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.2.0) — must already exist on the repo"
        required: true
        default: ""

permissions:
  contents: write

# Only one release at a time.  Pushing a new tag cancels any in-flight
# release — regardless of which tag started it.
concurrency:
  group: release
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── 0. Validate trigger ──────────────────────────────────────────────────────
  validate:
    name: Validate tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
      version: ${{ steps.resolve.outputs.version }}
    steps:
      - name: Resolve and validate tag
        id: resolve
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${{ github.ref_name }}"
          fi

          echo "Resolved tag: ${TAG}"

          if [[ ! "${TAG}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "❌ Tag '${TAG}' does not match vX.Y.Z — aborting."
            exit 1
          fi

          VERSION="${TAG#v}"
          echo "tag=${TAG}"         >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "✅ Tag ${TAG} (version ${VERSION}) is valid."

  # ── 1. GitHub Release ────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: [validate]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.validate.outputs.tag }}
          fetch-depth: 0

      - name: Install git-cliff
        uses: taiki-e/install-action@v2
        with:
          tool: git-cliff

      - name: Install Nushell
        uses: hustcer/setup-nu@v3
        with:
          version: "0.111.0"

      - name: Generate release notes (RELEASE_NOTES.md + CHANGELOG.md)
        run: nu scripts/ci/release_notes.nu ${{ needs.validate.outputs.tag }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.validate.outputs.tag }}
          body_path: RELEASE_NOTES.md
          files: |
            LICENSE
            README.md
            CHANGELOG.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── 2. Publish to crates.io ──────────────────────────────────────────────────
  publish:
    name: Publish to crates.io
    needs: [validate, release]
    runs-on: ubuntu-latest
    env:
      HAS_TOKEN: ${{ secrets.CRATES_IO_TOKEN != '' }}
    steps:
      - name: Guard — require CRATES_IO_TOKEN
        if: env.HAS_TOKEN != 'true'
        run: |
          VERSION="${{ needs.validate.outputs.version }}"
          echo "::error title=crates.io publish skipped::CRATES_IO_TOKEN is not configured — tui-spinner@${VERSION} was NOT published to crates.io. Add the secret and re-run the Release workflow for this tag."
          {
            echo "### ❌ crates.io publish skipped";
            echo "";
            echo "\`CRATES_IO_TOKEN\` is not configured, so **tui-spinner@${VERSION}** was **not** published to crates.io.";
            echo "";
            echo "Fix: add the secret, then re-run the Release workflow for tag \`v${VERSION}\` (\`just release-retrigger ${VERSION}\`).";
          } >> "$GITHUB_STEP_SUMMARY"
          exit 1

      - uses: actions/checkout@v6
        if: env.HAS_TOKEN == 'true'
        with:
          ref: ${{ needs.validate.outputs.tag }}

      - name: Install Rust stable
        if: env.HAS_TOKEN == 'true'
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo dependencies
        if: env.HAS_TOKEN == 'true'
        uses: Swatinem/rust-cache@v2

      - name: Publish
        if: env.HAS_TOKEN == 'true'
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        run: |
          VERSION="${{ needs.validate.outputs.version }}"
          echo "📦 Publishing tui-spinner@${VERSION} to crates.io…"
          if output=$(cargo publish 2>&1); then
            echo "$output"
            {
              echo "### ✅ Published to crates.io";
              echo "";
              echo "**tui-spinner@${VERSION}** is live: https://crates.io/crates/tui-spinner/${VERSION}";
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "$output"
            if echo "$output" | grep -q "already uploaded\|already exists"; then
              echo "::warning title=crates.io publish::tui-spinner@${VERSION} was already published — nothing to do."
              {
                echo "### ℹ️ crates.io publish skipped (already published)";
                echo "";
                echo "**tui-spinner@${VERSION}** was already on crates.io.";
              } >> "$GITHUB_STEP_SUMMARY"
            else
              echo "::error title=crates.io publish failed::cargo publish failed for tui-spinner@${VERSION}."
              exit 1
            fi
          fi
          echo "✅ Publish step complete."

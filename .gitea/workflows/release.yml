name: Release

on:
  push:
    tags:
      - "v*"
  # Manual fallback — trigger from the Gitea Actions UI if the tag push
  # ever silently skips or a re-run is needed without re-pushing the tag.
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.2.0) — must already exist on the repo"
        required: true
        default: ""

permissions:
  contents: write

# Only one release at a time.
concurrency:
  group: release
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── 0. Validate tag ──────────────────────────────────────────────────────────
  validate:
    name: Validate tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
      version: ${{ steps.resolve.outputs.version }}
    steps:
      - name: Resolve and validate tag
        id: resolve
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${{ github.ref_name }}"
          fi

          echo "Resolved tag: ${TAG}"

          if [[ ! "${TAG}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "❌ Tag '${TAG}' does not match vX.Y.Z — aborting."
            exit 1
          fi

          VERSION="${TAG#v}"
          echo "tag=${TAG}"         >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "✅ Tag ${TAG} (version ${VERSION}) is valid."

  # ── 1. Quality gate ──────────────────────────────────────────────────────────
  test:
    name: Test & lint
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.validate.outputs.tag }}

      - name: Install Rust stable (rustfmt + clippy)
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
          . "$HOME/.cargo/env"
          rustup component add rustfmt
          rustup component add clippy

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install Nushell
        run: cargo install nu --locked

      - name: Run quality gate (fmt + clippy + test)
        run: nu scripts/ci/quality_gate.nu

  # ── 2. Create Release ───────────────────────────────────────────────────────
  release:
    name: Create Release
    needs: [validate, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.validate.outputs.tag }}
          fetch-depth: 0

      - name: Install Rust stable
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Install git-cliff
        run: cargo install git-cliff --locked

      - name: Install Nushell
        run: cargo install nu --locked

      - name: Generate release notes (RELEASE_NOTES.md + CHANGELOG.md)
        run: nu scripts/ci/release_notes.nu ${{ needs.validate.outputs.tag }}

      - name: Create Release
        run: |
          TAG="${{ needs.validate.outputs.tag }}"
          GITEA_URL="${{ github.server_url }}"
          REPO="${{ github.repository }}"
          TOKEN="${{ secrets.GITHUB_TOKEN }}"

          echo "🎉 Creating new Gitea release for tag ${TAG}..."

          RELEASE_BODY=$(cat RELEASE_NOTES.md | python3 -c 'import sys,json; print(json.dumps(sys.stdin.read()))')
          RESPONSE=$(curl -s -X POST \
            "${GITEA_URL}/api/v1/repos/${REPO}/releases" \
            -H "Authorization: token ${TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{
              \"tag_name\": \"${TAG}\",
              \"name\": \"${TAG}\",
              \"body\": ${RELEASE_BODY},
              \"draft\": false,
              \"prerelease\": false
            }")

          RELEASE_ID=$(echo "$RESPONSE" | python3 -c 'import sys,json; print(json.load(sys.stdin)["id"])' 2>/dev/null)
          if [ -z "$RELEASE_ID" ] || [ "$RELEASE_ID" = "None" ]; then
            echo "❌ Failed to create release:"
            echo "$RESPONSE"
            exit 1
          fi
          echo "✅ Release created (id: ${RELEASE_ID})"

          # Upload assets
          for file in LICENSE README.md CHANGELOG.md; do
            [ -f "$file" ] || continue
            FILENAME=$(basename "$file")
            echo "📦 Uploading ${FILENAME}..."
            curl -s -X POST \
              "${GITEA_URL}/api/v1/repos/${REPO}/releases/${RELEASE_ID}/assets?name=${FILENAME}" \
              -H "Authorization: token ${TOKEN}" \
              -H "Content-Type: application/octet-stream" \
              --data-binary "@${file}" > /dev/null
            echo "✅ Uploaded ${FILENAME}"
          done

          echo "🎉 Release ${TAG} published at ${GITEA_URL}/${REPO}/releases/tag/${TAG}"

  # ── 3. Publish to crates.io ──────────────────────────────────────────────────
  publish:
    name: Publish to crates.io
    needs: [validate, release]
    runs-on: ubuntu-latest
    env:
      HAS_TOKEN: ${{ secrets.CRATES_IO_TOKEN != '' }}
    steps:
      - name: Skip notice (no token)
        if: env.HAS_TOKEN != 'true'
        run: echo "⏭️  CRATES_IO_TOKEN is not configured — skipping crates.io publish."

      - uses: actions/checkout@v4
        if: env.HAS_TOKEN == 'true'
        with:
          ref: ${{ needs.validate.outputs.tag }}

      - name: Install Rust stable
        if: env.HAS_TOKEN == 'true'
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Cache Cargo dependencies
        if: env.HAS_TOKEN == 'true'
        uses: Swatinem/rust-cache@v2

      - name: Publish
        if: env.HAS_TOKEN == 'true'
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        run: |
          VERSION="${{ needs.validate.outputs.version }}"
          echo "📦 Publishing tui-spinner@${VERSION} to crates.io…"
          output=$(cargo publish 2>&1) && echo "$output" || {
            echo "$output"
            echo "$output" | grep -q "already uploaded\|already exists" \
              && echo "⏭️  Already published — skipping." \
              || exit 1
          }
          echo "✅ Publish step complete."

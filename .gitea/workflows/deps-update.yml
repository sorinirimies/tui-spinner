# ─────────────────────────────────────────────────────────────────────
#  Dependency Update — tui-spinner (Gitea Actions)
#  Nightly job that upgrades dependencies, runs the quality gate,
#  and opens a pull request with the changes.
#
#  Mirror of .github/workflows/deps-update.yml adapted for Gitea Actions:
#    - Schedule offset by 30 min (02:30 UTC) to avoid overlap with GitHub.
#    - Uses GITEA_TOKEN instead of GH_PAT.
#    - Creates and auto-merges PRs via the Gitea REST API (no
#      peter-evans/create-pull-request marketplace action).
#    - Pushes changes to a dedicated branch, then uses curl against
#      the Gitea API to open and merge the pull request.
#
#  Schedule: every day at 02:30 UTC.
#  Can also be triggered manually via workflow_dispatch.
# ─────────────────────────────────────────────────────────────────────

name: Dependency Update

on:
  schedule:
    # Run every day at 02:30 UTC (offset from GitHub's 02:00).
    - cron: "30 2 * * *"
  workflow_dispatch:

# Only one dependency-update run at a time.
concurrency:
  group: deps-update
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  BRANCH_NAME: chore/deps-update
  BASE_BRANCH: main

permissions:
  contents: write
  pull-requests: write

jobs:
  # ── Upgrade, verify, and open PR ─────────────────────────────────
  deps-update:
    name: Upgrade dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITEA_TOKEN || secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      # ── Toolchain ────────────────────────────────────────────────
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      # ── Install cargo-edit (provides `cargo upgrade`) ────────────
      - name: Install cargo-edit
        run: |
          cargo install cargo-edit --locked
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      # ── Pre-warm the registry ────────────────────────────────────
      - name: Pre-warm registry
        run: |
          cargo update
          cargo fetch

      # ── Upgrade dependencies ─────────────────────────────────────
      - name: Upgrade dependencies
        run: |
          # Upgrade to latest versions, including incompatible bumps.
          cargo upgrade --incompatible allow
          # Re-resolve the lock file after the upgrades.
          cargo update

      # ── Check for changes ────────────────────────────────────────
      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "ℹ️  No dependency changes detected."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "📦 Dependency changes detected."
            git diff --stat
          fi

      # ── Quality gate — only if something changed ─────────────────
      - name: Check formatting
        if: steps.changes.outputs.changed == 'true'
        run: cargo fmt --check

      - name: Clippy
        if: steps.changes.outputs.changed == 'true'
        run: cargo clippy --all-features -- -D warnings

      - name: Tests
        if: steps.changes.outputs.changed == 'true'
        run: cargo test --all-features

      # ── Push changes to branch ───────────────────────────────────
      - name: Push changes to branch
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name  "gitea-actions[bot]"
          git config user.email "gitea-actions[bot]@users.noreply.gitea.com"

          # Force-push to the update branch (create or overwrite).
          git checkout -B "$BRANCH_NAME"
          git add -A
          git commit -m "chore(deps): automated dependency upgrades"
          git push --force origin "$BRANCH_NAME"

      # ── Create PR via Gitea API ──────────────────────────────────
      - name: Create pull request via Gitea API
        if: steps.changes.outputs.changed == 'true'
        id: create_pr
        run: |
          API_BASE="${GITHUB_SERVER_URL}/api/v1"
          REPO="${GITHUB_REPOSITORY}"
          TOKEN="${{ secrets.GITEA_TOKEN || secrets.GITHUB_TOKEN }}"

          PR_TITLE="chore(deps): automated dependency upgrades"
          PR_BODY="## 🤖 Automated Dependency Update\n\nThis PR was created by the **Dependency Update** workflow.\n\n### Changes\n- Ran \`cargo upgrade --incompatible allow\`\n- Ran \`cargo update\`\n\n### Quality Gate\n- ✅ \`cargo fmt --check\`\n- ✅ \`cargo clippy -- -D warnings\`\n- ✅ \`cargo test --all-features\`\n\n---\n*Auto-generated by deps-update.yml*"

          # Check if there is already an open PR from this branch.
          EXISTING_PR=$(curl -s -f \
            -H "Authorization: token ${TOKEN}" \
            -H "Content-Type: application/json" \
            "${API_BASE}/repos/${REPO}/pulls?state=open&head=${BRANCH_NAME}" \
            | jq '.[0].number // empty' 2>/dev/null || echo "")

          if [ -n "$EXISTING_PR" ]; then
            echo "ℹ️  PR #${EXISTING_PR} already exists — updating."
            echo "pr_number=${EXISTING_PR}" >> "$GITHUB_OUTPUT"
          else
            # Create a new pull request.
            RESPONSE=$(curl -s -f -X POST \
              -H "Authorization: token ${TOKEN}" \
              -H "Content-Type: application/json" \
              -d "{
                \"title\": \"${PR_TITLE}\",
                \"body\": \"${PR_BODY}\",
                \"head\": \"${BRANCH_NAME}\",
                \"base\": \"${BASE_BRANCH}\",
                \"labels\": []
              }" \
              "${API_BASE}/repos/${REPO}/pulls")

            PR_NUMBER=$(echo "$RESPONSE" | jq -r '.number')

            if [ -z "$PR_NUMBER" ] || [ "$PR_NUMBER" = "null" ]; then
              echo "::error::Failed to create PR. Response: $RESPONSE"
              exit 1
            fi

            echo "✅ Created PR #${PR_NUMBER}"
            echo "pr_number=${PR_NUMBER}" >> "$GITHUB_OUTPUT"
          fi

      # ── Auto-merge the PR via Gitea API ──────────────────────────
      - name: Auto-merge pull request via Gitea API
        if: steps.changes.outputs.changed == 'true' && steps.create_pr.outputs.pr_number
        run: |
          API_BASE="${GITHUB_SERVER_URL}/api/v1"
          REPO="${GITHUB_REPOSITORY}"
          TOKEN="${{ secrets.GITEA_TOKEN || secrets.GITHUB_TOKEN }}"
          PR_NUMBER="${{ steps.create_pr.outputs.pr_number }}"

          echo "🔀 Merging PR #${PR_NUMBER}..."

          MERGE_RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            -H "Authorization: token ${TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{
              \"Do\": \"squash\",
              \"merge_message_field\": \"chore(deps): automated dependency upgrades (#${PR_NUMBER})\",
              \"delete_branch_after_merge\": true
            }" \
            "${API_BASE}/repos/${REPO}/pulls/${PR_NUMBER}/merge")

          HTTP_CODE=$(echo "$MERGE_RESPONSE" | tail -n1)
          BODY=$(echo "$MERGE_RESPONSE" | sed '$d')

          if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "204" ]; then
            echo "✅ PR #${PR_NUMBER} merged successfully."
          elif [ "$HTTP_CODE" = "405" ]; then
            echo "⚠️  PR #${PR_NUMBER} cannot be merged (may need manual review)."
            echo "   Response: ${BODY}"
          else
            echo "⚠️  Unexpected response (HTTP ${HTTP_CODE}) when merging PR #${PR_NUMBER}."
            echo "   Response: ${BODY}"
            echo "   PR remains open for manual review."
          fi

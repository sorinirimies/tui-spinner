# ─────────────────────────────────────────────────────────────────────
#  Nightly Dependency Upgrade — tui-spinner (Gitea Actions)
#  Runs daily at 02:30 UTC.  Upgrades dependency pins via cargo-edit,
#  refreshes Cargo.lock, passes the quality gate, then pushes directly
#  to main.
#
#  Pure-Rust library — no system libraries needed.
#
#  Schedule: every day at 02:30 UTC (offset from GitHub's 02:00).
#  Can also be triggered manually via workflow_dispatch.
# ─────────────────────────────────────────────────────────────────────

name: Nightly Dependency Upgrade

on:
  schedule:
    # Run every day at 02:30 UTC (offset from GitHub's 02:00).
    - cron: "30 2 * * *"
  workflow_dispatch:

# Only one dependency-update run at a time.
concurrency:
  group: deps-update
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  upgrade-deps:
    name: Upgrade Dependencies
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Rust toolchain ────────────────────────────────────────────────────────
      - name: Install Rust stable (rustfmt + clippy)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2

      # ── cargo-edit (provides `cargo upgrade`) ────────────────────────────────
      - name: Install cargo-edit
        run: |
          cargo install cargo-edit --locked
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      # ── Pre-warm the registry ─────────────────────────────────────────────────
      # `cargo upgrade`'s resolver can fail if previously-cached package versions
      # have been yanked.  Running `cargo update` first refreshes the index and
      # `cargo fetch` downloads the resolved sources so the offline phase has
      # valid candidates for every transitive dependency.
      - name: Pre-warm cargo registry (refresh index + fetch sources)
        run: |
          cargo update
          cargo fetch

      # ── Upgrade all dependency pins ──────────────────────────────────────────
      # `cargo upgrade --incompatible allow` rewrites version constraints in
      # Cargo.toml so pinned libs can advance to new major versions.
      # `cargo update` then resolves the new constraints into Cargo.lock.
      - name: Upgrade workspace dependency pins
        run: cargo upgrade --incompatible allow

      - name: Sync Cargo.lock
        run: cargo update

      # ── Check for changes ────────────────────────────────────────────────────
      - name: Check for changes
        id: check
        run: |
          if git diff --quiet Cargo.toml Cargo.lock; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "ℹ️  No dependency changes detected."
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "📦 Dependency changes detected."
            git diff --stat
          fi

      # ── Quality gate — only if something changed ─────────────────────────────
      - name: Check formatting
        if: steps.check.outputs.has_changes == 'true'
        run: cargo fmt --check

      - name: Clippy
        if: steps.check.outputs.has_changes == 'true'
        run: cargo clippy --all-features -- -D warnings

      - name: Tests
        if: steps.check.outputs.has_changes == 'true'
        run: cargo test --all-features

      # ── Commit and push directly to main ─────────────────────────────────────
      # Quality gate already passed — safe to push directly.
      - name: Commit and push dependency updates
        if: steps.check.outputs.has_changes == 'true'
        run: |
          DATE=$(date -u '+%Y-%m-%d')

          git config user.name  "gitea-actions[bot]"
          git config user.email "gitea-actions[bot]@noreply.gitea"

          git add Cargo.toml Cargo.lock
          git commit -m "chore(deps): nightly dependency upgrade $DATE"
          git push origin main

          echo "✅ Dependency updates pushed to main."

      - name: Nothing to update
        if: steps.check.outputs.has_changes == 'false'
        run: echo "✅ All dependencies already up to date — nothing to upgrade."

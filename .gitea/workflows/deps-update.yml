name: Nightly Dependency Upgrade

on:
  schedule:
    # Runs at 02:30 UTC every day (offset from GitHub's 02:00)
    - cron: "30 2 * * *"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

concurrency:
  group: deps-update
  cancel-in-progress: true

jobs:
  upgrade-deps:
    name: Upgrade Dependencies
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Rust toolchain ────────────────────────────────────────────────────────
      - name: Install Rust stable (rustfmt + clippy)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2

      # ── cargo-edit (provides `cargo upgrade`) ────────────────────────────────
      - name: Install cargo-edit
        run: cargo install cargo-edit --locked

      # ── Pre-warm cargo registry ──────────────────────────────────────────────
      # `cargo upgrade`'s resolver can fail if previously-cached package versions
      # have been yanked.  Running `cargo update` first refreshes the index and
      # `cargo fetch` downloads the resolved sources so the offline phase has
      # valid candidates for every transitive dependency.
      - name: Pre-warm cargo registry (refresh index + fetch sources)
        run: cargo update && cargo fetch

      # ── Upgrade all dependency pins ──────────────────────────────────────────
      - name: Upgrade workspace dependency pins
        run: cargo upgrade --incompatible allow

      - name: Sync Cargo.lock
        run: cargo update

      # ── Reject downgrades ────────────────────────────────────────────────────
      # Compare every version in Cargo.toml before/after the upgrade.
      # If any dependency version decreased, abort — upgrades only.
      - name: Reject version downgrades
        run: |
          echo "🔍 Checking for version downgrades in Cargo.toml…"

          # Extract "package = version" pairs from old and new Cargo.toml
          git show HEAD:Cargo.toml > /tmp/old_cargo.toml

          parse_versions() {
            grep -E 'version\s*=' "$1" \
              | grep -vE '^\s*#' \
              | sed -n 's/.*\b\([a-zA-Z0-9_-]*\)\b.*version\s*=\s*"\([^"]*\)".*/\1 \2/p'
          }

          # Fallback: extract lines like `pkg = { version = "X.Y" ... }` and `pkg = "X.Y"`
          extract_deps() {
            awk '
              /^\[dependencies\]/ || /^\[dev-dependencies\]/ || /^\[build-dependencies\]/ { in_deps=1; next }
              /^\[/ { in_deps=0 }
              in_deps && /version\s*=/ {
                # pkg = { version = "X.Y" ... }
                if (match($0, /^([a-zA-Z0-9_-]+)\s*=.*version\s*=\s*"([^"]+)"/, m)) {
                  print m[1], m[2]
                }
              }
              in_deps && /^[a-zA-Z0-9_-]+\s*=\s*"/ {
                # pkg = "X.Y"
                if (match($0, /^([a-zA-Z0-9_-]+)\s*=\s*"([^"]+)"/, m)) {
                  print m[1], m[2]
                }
              }
            ' "$1"
          }

          extract_deps /tmp/old_cargo.toml | sort > /tmp/old_versions.txt
          extract_deps Cargo.toml | sort > /tmp/new_versions.txt

          downgrades=""
          while read -r pkg old_ver; do
            new_ver=$(awk -v p="$pkg" '$1 == p { print $2 }' /tmp/new_versions.txt)
            [ -z "$new_ver" ] && continue

            # Compare using sort -V (version sort). If old > new, it's a downgrade.
            higher=$(printf '%s\n%s\n' "$old_ver" "$new_ver" | sort -V | tail -n1)
            if [ "$higher" = "$old_ver" ] && [ "$old_ver" != "$new_ver" ]; then
              echo "❌ DOWNGRADE: $pkg $old_ver → $new_ver"
              downgrades="$downgrades $pkg"
            fi
          done < /tmp/old_versions.txt

          if [ -n "$downgrades" ]; then
            echo ""
            echo "🚫 Aborting — version downgrades detected. Only upgrades are allowed."
            echo "   Affected packages:$downgrades"
            echo "   Restoring original Cargo.toml…"
            git checkout -- Cargo.toml
            cargo update
            exit 1
          fi

          echo "✅ No downgrades detected — all changes are upgrades."

      # ── Check for changes ────────────────────────────────────────────────────
      - name: Check for changes
        id: check
        run: |
          if git diff --quiet Cargo.toml Cargo.lock; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "ℹ️  No dependency changes detected."
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "📦 Dependency changes detected."
            git diff --stat
          fi

      # ── Quality gate ─────────────────────────────────────────────────────────
      - name: Check formatting
        if: steps.check.outputs.has_changes == 'true'
        run: cargo fmt --check

      - name: Run clippy
        if: steps.check.outputs.has_changes == 'true'
        run: cargo clippy --all-features -- -D warnings

      - name: Run tests
        if: steps.check.outputs.has_changes == 'true'
        run: cargo test --all-features

      # ── Commit and push directly to main ─────────────────────────────────────
      - name: Commit and push dependency updates
        if: steps.check.outputs.has_changes == 'true'
        run: |
          DATE=$(date -u '+%Y-%m-%d')

          git config user.name  "gitea-actions[bot]"
          git config user.email "gitea-actions[bot]@noreply.gitea"

          git add Cargo.toml Cargo.lock
          git commit -m "chore(deps): nightly dependency upgrade $DATE"
          git push origin main

          echo "✅ Dependency updates pushed to main."

      - name: Nothing to update
        if: steps.check.outputs.has_changes == 'false'
        run: echo "✅ All dependencies already up to date — nothing to upgrade."
